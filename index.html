<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Worm Game</title>
<style>
    *{box-sizing: border-box;}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
    radial-gradient(circle at top left, rgba(34, 197, 94, 0.16), transparent 34%),
    radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.18), transparent 36%),
    #15191f;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

.game-wrap {
    width: min(94vw, 760px);
    padding: 16px
}

.hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
    flex-wrap: wrap;
}

.hud div {
    background: #232a33;
    border: 1px solid #35404d;
    padding: 8px 12px;
    border-radius: 8px;
    font-weight: bold;
    min-width: 104px;
    text-align: center;
}

.level-picker,
.speed-picker {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #232a33;
    border: 1px solid #35404d;
    padding: 6px;
    border-radius: 8px;
}

select {
    height: 34px;
    background: #151b24;
    color: white;
    border: 1px solid #3f4b5b;
    border-radius: 7px;
    padding: 0 8px;
    font-weight: bold;
    cursor: pointer;
}

canvas {
    width: 100%;
    aspect-ratio: 1/1;
    display: block;
    background: #202832;
    border: 3px solid #3d4856;
    border-radius: 10px;
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
}

.controls {
    margin-top: 10px;
    text-align: center;
    color: #cbd5e1;
    font-size: 14px;
}

button {
    background: #27c46b;
    color: #07140d;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-weight: bold;
    cursor: pointer;
}

.level-picker button {
    width: 34px;
    height: 34px;
    padding: 0;
    font-size: 18px;
    line-height: 1;
}

button:hover {background: #35dd7d;}
</style>
</head>
<body>
<div class="game-wrap">
<div class="hud">
    <div id="level">Level: 1/10</div>
    <div id="length">Length: 3</div>
    <div id="goal">Food: 0/2</div>
    <div class="level-picker">
        <button onclick="skipLevel(-1)" title="Previous level">‹</button>
        <select id="levelSelect" onchange="jumpToLevel(this.value)"
    title="Choose level"></select>
    <button onclick="skipLevel(1)" title="Next level">›</button>
    </div>
    <div class="speed-picker">
        <select id="speedSelect" onchange="changeSpeed(this.value)"
        title="Choose worm speed">
    <option value="slow">Slow</option>
    <option value="medium" selected>Medium </option>
    <option value="fast">Fast</option>
    </select>
    </div>
    <button onclick="restartLevel()">Restart</button>
    </div>

    <canvas id="game" width="600" height="600"></canvas>

    <div class="controls">
        Arrow Keys/WASD to move. Eat glowing food, grow longer, reach the portal.
    </div>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const levelText = document.getElementById("level");
    const lengthText = document.getElementById("length");
    const goalText = document.getElementById("goal");
    const levelSelect = document.getElementById("levelSelect");
    const speedSelect = document.getElementById("speedSelect");

    const size = 20;
    const cells = canvas.width / size;

    let level = 1;
    let worm ;
    let dir;
    let nextDir;
    let food;
    let portal;
    let walls;
    let foodEaten;
    let requiredFood;
    let speed;
    let gameLoop;
    let gameState = "playing";
    let particles = [];
    let speedMode = "medium";

    const speedModes = {
        slow: 1.35,
        medium: 1,
        fast: 0.72
    };

    const levels = [
        { requiredFood: 2, speed: 140, start: {x: 2, y: 2}, portal: {x: 27, y: 27}, walls: []},
        { requiredFood: 3, speed: 130, start: {x: 2, y: 2}, portal: {x: 27, y: 27}, walls: rectWall(8, 5, 1, 18).concat(rectWall(17, 7, 1, 18))},
        { requiredFood: 4, speed: 120, start: {x: 2, y: 15}, portal:{x: 27, y: 15}, walls: rectWall(7, 3, 1, 20).concat(rectWall(15, 7, 1, 20), rectWall(23, 3, 1, 20))},
        { requiredFood: 5, speed: 112, start: {x: 2, y: 2}, portal: {x: 27, y: 27}, walls: rectWall(5, 5, 20, 1).concat(rectWall(5, 14, 20, 1), rectWall(5, 23, 20, 1))},
        { requiredFood: 5, speed: 104, start: {x: 14, y: 2}, portal: {x: 14, y: 27}, walls: rectWall(4, 4, 22, 1,).concat(rectWall(4, 25, 22, 1), rectWall(4, 4, 1, 22), rectWall(25, 4, 1, 22))},
        { requiredFood: 6, speed: 96, start: {x: 14, y: 2}, portal: {x: 27, y: 2}, walls: rectWall(6, 6, 18, 1).concat(rectWall(6, 12, 18, 1), rectWall(6, 18, 18, 1), rectWall(6, 24, 18, 1))},
        { requiredFood: 6, speed: 88, start: {x: 2, y: 2}, portal: {x: 27, y: 27}, walls: makeCheckerWalls()},
        { requiredFood: 7, speed: 80, start: {x: 15, y: 15}, portal: {x: 27, y: 27}, walls: makeRingMaze()},
        { requiredFood: 8, speed: 72, start: {x: 2, y: 15}, portal: {x: 27, y: 15}, walls: rectWall(5, 2, 1, 22).concat(rectWall(10, 6, 1, 22), rectWall(15, 2, 1, 22), rectWall(20, 6, 1, 22), rectWall(25, 2, 1, 22))},
        { requiredFood: 10, speed: 64, start: {x: 2, y: 2}, portal: {x: 27, y: 27}, walls: makeFinalMaze()}
    ];

    function rectWall(x, y, w, h) {
        const arr = [];
        for (let ix = x; ix < x + w; ix++) {
            for (let iy = y; iy < y + h; iy++) arr.push({ x: ix, y: iy });
        }
        return arr;
    }
    
    function makeCheckerWalls() {
        const arr = [];
        for (let x = 5; x < 26; x += 4) {
            for (let y = 5; y < 26; y += 4) arr.push({ x, y }, { x: x + 1, y });
        }
        return arr;
        }

        function makeFinalMaze() {
            return []
            .concat(rectWall(4, 4, 22, 1), rectWall(4, 8, 1, 18), rectWall(8, 4, 1, 18))
            .concat(rectWall(12, 8, 1, 18), rectWall(16, 4, 1, 18), rectWall(20, 8, 1, 18))
            .concat(rectWall(24, 4, 1, 18), rectWall(4, 26, 21, 1));
        }

        function makeRingMaze() {
            const gaps = [
                { x: 14, y: 3},
                { x: 15, y: 3},
                { x: 26, y: 14},
                { x: 26, y: 15},
                { x: 9, y: 14},
                { x: 9, y: 15},
                { x: 14, y: 20},
                { x: 15, y: 20}
            ];

            return rectWall(3, 3, 24, 1)
            .concat(rectWall(3, 26, 24, 1), rectWall(3, 3, 1, 24), rectWall(26, 3, 1, 24))
            .concat(rectWall(9, 9, 12, 1), rectWall( 9, 20, 12, 1), rectWall(9, 9, 1, 12), rectWall(20, 9, 1, 12))
            .filter(wall => !gaps.some(gap => same(wall, gap)));
        }

        function startLevel() {
            const data = levels[level - 1];
            worm = [
                { x: data.start.x, y: data.start.y },
                { x: data.start.x - 1, y: data.start.y },
                { x: data.start.x - 2, y: data.start.y }
            ];

            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            portal = data.portal;
            walls = data.walls.slice();
            requiredFood = data.requiredFood;
            foodEaten = 0;
            speed = getSpeed(data.speed);
            gameState = "ready";
            particles = [];

            placeFood();
            updateHud();
            clearInterval(gameLoop);
            gameLoop = setInterval(tick, speed);
            draw();
            drawMessage("Ready?", "Press an arrow key or WASD keys to start!");
        }

        function restartLevel() { startLevel(); } 

        function skipLevel(change) {
            level += change;
            if (level < 1) level = levels.length;
            if (level > levels.length) level = 1;
            startLevel();
        }

        function jumpToLevel(value) {
            level = Number(value);
            startLevel();
        }

        function changeSpeed(value) {
            speedMode = value;
            speed = getSpeed(levels[level - 1].speed);
            clearInterval(gameLoop);
            gameLoop = setInterval(tick, speed);
        }

        function getSpeed(baseSpeed) {
            return Math.round(baseSpeed * speedModes[speedMode]);
        }

        function updateHud() {
            levelText.textContent = "Level: " + level + "/" + levels.length;
            lengthText.textContent = "Length: " + worm.length;
            goalText.textContent = "Food: " + foodEaten + "/" + requiredFood;
            levelSelect.value = String(level);
            speedSelect.value = speedMode;
        }

        function placeFood() {
            if (foodEaten >= requiredFood) {
                food = null;
                return;
            }

            const reachable = getReachableCells(worm[0]);
            const choices = reachable.filter(pos =>
                !collides(pos, worm) &&
                !same(pos, portal)
            );

            food = choices[Math.floor(Math.random() * choices.length)];
        }
        
        function tick() {
            if (gameState !== "playing") return;
            dir = nextDir;

            const head = { x: worm[0].x + dir.x, y: worm[0].y + dir.y };

            if (head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells || collides(head, walls) || collides(head, worm)) {
                gameOver();
                return;
            }

            worm.unshift(head);

            if (food && same(head, food)) {
                foodEaten++;
                burst(food.x * size + size / 2, food.y * size + size / 2, "#facc15");
                if (foodEaten >= requiredFood) {
                    food = null;
                    burst(portal.x * size + size / 2, portal.y * size + size / 2, "#8b5cf6");
                } else {
                    placeFood();
                }
            } else {
                worm.pop();
            }

            if (same(head, portal) && foodEaten >= requiredFood) {
                nextLevel();
                return;
            }

            updateHud();
            draw();
        }

        function gameOver() {
            gameState = "dead";
            draw();
            drawMessage("Crashed!", "Press Space to Retry");
        }

        function nextLevel() {
            if (level >= levels.length) {
                gameState = "won";
                clearInterval(gameLoop);
                draw();
                drawMessage("You escaped!", "You completed all 10 levels!");
            } else {
                level++;
                startLevel();
            }
        }

        function collides(pos, arr) { return arr.some(p => same(pos, p)); }
        function same(a, b) { return a.x === b.x && a.y === b.y; }

        function getReachableCells(start) {
            const queue = [start];
            const visited = new Set([positionKey(start)]);
            const reachable = [];
            const moves = [
                { x: 1, y: 0 },
                { x: -1, y: 0 },
                { x: 0, y: 1 },
                { x: 0, y: -1 }
            ];

            while (queue.length) {
                const current = queue.shift();
                reachable.push(current);

                for (const move of moves) {
                    const next = { x: current.x + move.x, y: current.y + move.y };
                    const key = positionKey(next);

                    if (
                        next.x < 0 ||
                        next.y < 0 ||
                        next.x >= cells ||
                        next.y >= cells ||
                        visited.has(key) ||
                        collides(next, walls)
                    ) continue;

                    visited.add(key);
                    queue.push(next);
                }
            }

            return reachable;
        }

        function positionKey(pos) {
            return pos.x + "," + pos.y;
        }

        function burst(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y, color,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 14
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawWalls();
            drawPortal();
            drawFood();
            drawWorm();
            drawParticles();
        }

        function drawGrid() {
            ctx.fillStyle = "#202832";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#2a3440";
            ctx.lineWidth = 1;
            for (let i = 0; i <= cells; i++) {
                ctx.beginPath();
                ctx.moveTo(i * size, 0);
                ctx.lineTo(i * size, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * size);
                ctx.lineTo(canvas.width, i * size);
                ctx.stroke();
            }
        }

        function drawWalls() {
            for (const wall of walls) {
                const x = wall.x * size;
                const y = wall.y * size;
                ctx.fillStyle = "#5d6675";
                ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
                ctx.fillStyle = "#808b9d";
                ctx.fillRect(x + 4, y + 4, size - 8, 4);
            }
        }

        function drawPortal() {
            const x = portal.x * size + size / 2;
            const y = portal.y * size + size / 2;
            const open = foodEaten >= requiredFood;

            ctx.save();
            ctx.shadowColor = open ? "#8b5cf6" : "#71717a";
            ctx.shadowBlur = open ? 22 : 8;
            ctx.fillStyle = open ? "#8b5cf6" : "#3f3f46";
            ctx.beginPath();
            ctx.arc(x, y, size * 0.46, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = open ? "#d8b4fe" : "#71717a";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.29, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawFood() {
            if (!food) return;

            const x = food.x * size + size / 2;
            const y = food.y * size + size / 2;
            ctx.save();
            ctx.shadowColor = "#facc15";
            ctx.shadowBlur = 14;
            ctx.fillStyle = "#facc15";
            ctx.beginPath();
            ctx.arc(x, y, size * 0.34, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff7ad";
            ctx.beginPath();
            ctx.arc(x - 3, y - 4, size * 0.12, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawWorm() {
            for (let i = worm.length - 1; i >= 0; i--) {
                const part = worm[i];
                const x = part.x * size;
                const y = part.y * size;
                ctx.fillStyle = i === 0 ? "#36d399" : `hsl(${142 - i * 2}, 70%, ${52 - Math.min(i, 16)}%)`;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, size - 4, size - 4, 7);
                ctx.fill();

                if (i === 0) {
                    ctx.fillStyle = "#062016";
                    const eyeOffsetX = dir.x !== 0 ? dir.x * 4 : 0;
                    const eyeOffsetY = dir.y !== 0 ? dir.y * 4 : 0;
                    ctx.beginPath();
                    ctx.arc( x + 7 + eyeOffsetX, y + 7 + eyeOffsetY, 2, 0, Math.PI * 2);
                    ctx.arc( x + 13 + eyeOffsetX, y + 7 + eyeOffsetY, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawParticles() {
            particles = particles.filter(p => p.life > 0);
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                ctx.globalAlpha = p.life / 14;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function drawMessage(title, subtitle) {
            ctx.fillStyle = "rgba(10, 14, 20, 0.72)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.font = "bold 44px Arial";
            ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 18);
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "20px Arial";
            ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 24);
        }

        document.addEventListener("keydown", e => {
            const key = e.key.toLowerCase();
            if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) e.preventDefault();

            if (key === " " && gameState === "dead") {
                restartLevel();
                return;
            }

            const moving = key === "arrowup" || key === "w" || key === "arrowdown" || key === "s" ||
                key === "arrowleft" || key === "a" || key === "arrowright" || key === "d";

            if (!moving) return;

            if ((key === "arrowup" || key === "w") && dir.y !== 1) nextDir = { x: 0, y: -1 };
            if ((key === "arrowdown" || key === "s") && dir.y !== -1) nextDir = { x: 0, y: 1 };
            if ((key === "arrowleft" || key === "a") && dir.x !== 1) nextDir = { x: -1, y: 0 };
            if ((key === "arrowright" || key === "d") && dir.x !== -1) nextDir = { x: 1, y: 0 };

            if (gameState === "ready") {
                gameState = "playing";
                draw();
            }
        });

        function setupLevelSelect() {
            levelSelect.innerHTML = "";

            for (let i = 1; i <= levels.length; i++) {
                const option = document.createElement("option");
                option.value = String(i);
                option.textContent = "Level " + i;
                levelSelect.appendChild(option);
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r)
            {
                this.beginPath();
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
            };
        }

        setupLevelSelect();
        startLevel();
        </script>
        </body>
        </html>
